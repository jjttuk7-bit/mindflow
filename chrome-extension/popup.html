<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5z" fill="#8B4F35"/>
          <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="#8B4F35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        DotLine
      </div>
      <button class="btn-logout" id="btnLogout" style="display:none;">Logout</button>
    </div>

    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
      <h2>DotLine</h2>
      <p>Save and organize pages with AI</p>
      <div class="login-error" id="loginError"></div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btnLogin">Login</button>
      <div class="divider"><span>or</span></div>
      <button class="btn-google" id="btnGoogle">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
    </div>

    <!-- Save Screen -->
    <div class="save-screen" id="saveScreen">
      <div class="page-info">
        <div class="page-title" id="pageTitle">Loading...</div>
        <div class="page-url" id="pageUrl"></div>
      </div>
      <div class="note-group">
        <label for="note">Memo (optional)</label>
        <textarea id="note" placeholder="Add a note about this page..." rows="2"></textarea>
      </div>
      <div class="status" id="status"></div>
      <button class="btn-primary" id="btnSave">Save to DotLine</button>
      <div class="user-info" id="userInfo"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
