<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4724A"/>
      <stop offset="100%" stop-color="#8B4F35"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Bold M letterform - wide and clear at small sizes -->
  <path
    d="M 105 390 L 105 130 L 256 310 L 407 130 L 407 390"
    fill="none"
    stroke="white"
    stroke-width="44"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Subtle flow wave under M -->
  <path
    d="M 100 430 Q 200 455 256 435 Q 312 415 412 440"
    fill="none"
    stroke="rgba(255,255,255,0.25)"
    stroke-width="14"
    stroke-linecap="round"
  />
</svg>
